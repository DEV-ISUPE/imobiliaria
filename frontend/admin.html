<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo - Maison Huambo</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <header>
    <h1>Painel do Corretor</h1>
    <nav>
      <a href="index.html">Voltar ao Site</a>
    </nav>
  </header>

  <main>
    <section id="add-property">
      <h2>Cadastrar Novo Imóvel</h2>
      <form id="property-form">
        <input type="text" id="title" placeholder="Título" required>
        <input type="number" id="price" placeholder="Preço" required>
        <textarea id="description" placeholder="Descrição" required></textarea>
        <button type="submit">Cadastrar</button>
      </form>
    </section>

    <section id="property-list">
      <h2>Imóveis Cadastrados</h2>
      <div id="properties-admin"></div>
    </section>
  </main>

  <script src="js/admin.js"></script>
</body>
</html>
